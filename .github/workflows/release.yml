name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/target/BlockParty-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Modrinth & Hangar
        uses: HSGamer/action-mcreleaser@v1
        with:
          name: BlockParty ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          game-versions: '1.20,1.21'
        env:
          # You need to configure these in the repository secrets
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT: 'blockparty' # REPLACE WITH ACTUAL SLUG
          MODRINTH_LOADERS: 'spigot,paper,purpur'
          
          HANGAR_KEY: ${{ secrets.HANGAR_KEY }}
          HANGAR_PROJECT: 'blockparty' # REPLACE WITH ACTUAL SLUG
          HANGAR_CHANNEL: 'Release'
